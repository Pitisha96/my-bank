databaseChangeLog:
  - changeSet:
      id: 001-create-accounts-table
      author: pitosha96
      context: dev

      preConditions:
      - dbms:
          type: postgresql
      - not:
          tableExists:
            tableName: accounts

      changes:
        - createTable:
            tableName: accounts
            columns:
              - column:
                  name: id
                  type: uuid
                  defaultValueComputed: gen_random_uuid()
                  constraints:
                    primaryKey: true
              - column:
                  name: number
                  type: varchar(255)
                  constraints:
                    nullable: false
              - column:
                  name: number_hash
                  type: varchar(255)
                  constraints:
                    nullable: false
                    unique: true
              - column:
                  name: owner_id
                  type: uuid
                  constraints:
                    nullable: false
              - column:
                  name: currency
                  type: varchar(4)
                  constraints:
                    nullable: false
              - column:
                  name: balance
                  type: numeric(19,4)
                  constraints:
                    nullable: false
              - column:
                  name: reserved
                  type: numeric(19,4)
                  constraints:
                    nullable: false
              - column:
                  name: status
                  type: varchar(10)
                  constraints:
                    nullable: false
              - column:
                  name: created_at
                  type: timestamptz
                  constraints:
                    nullable: false
              - column:
                  name: updated_at
                  type: timestamptz
                  constraints:
                    nullable: false

      rollback:
        - dropTable:
            tableName: accounts
